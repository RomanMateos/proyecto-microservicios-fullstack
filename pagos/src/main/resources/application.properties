# Configuracion del Servidor
server.port=8085
spring.application.name=ms-pagos

# Configuracion de Base de Datos (Ajusta la URL y credenciales segun tu entorno)
spring.datasource.url=jdbc:mysql://localhost:3306/db_pagos?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# Migraciones con Flyway
spring.flyway.baseline-on-migrate=true

# Configuracion Esencial de Swagger / OpenAPI 2.8.5
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.operationsSorter=alpha

# Configuracion de HATEOAS
spring.hateoas.use-hal-as-default=true