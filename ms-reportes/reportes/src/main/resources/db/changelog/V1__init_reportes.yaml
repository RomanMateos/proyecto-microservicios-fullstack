databaseChangeLog:
  - changeSet:
      id: 1
      author: RomanMateos
      changes:
        - createTable:
            tableName: reportes
            columns:
              - column:
                  name: reporte_id
                  type: INT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: titulo
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
              - column:
                  name: descripcion
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: monto_total
                  type: DOUBLE
                  constraints:
                    nullable: false
              - column:
                  name: total_pedidos
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: activo
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: fecha_generacion
                  type: DATE
                  constraints:
                    nullable: false