server.port=8086
spring.datasource.url=jdbc:mysql://localhost:3306/prueba5?useSSL=false&serverTimezone=America/Santiago&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# CONFIGURACIÓN DE JPA/HIBERNATE PARA MYSQL
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.generate_statistics=true

# OPCIONAL: Configuración del pool de conexiones
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10



# Si la BD ya tenia tablas, aceptarlas como punto de partida
spring.flyway.baseline-on-migrate=true


# Liquibase ? apunta al archivo maestro changelog
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
