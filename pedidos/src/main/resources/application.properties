spring.application.name=pedido-service
server.port=8098

# Configuraciµn de la Base de Datos
spring.datasource.url=jdbc:mysql://localhost:3306/db_pedidos?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuraciµn de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Configuraciµn de Flyway
spring.flyway.enabled=true

# Configuraciµn de timeouts para resiliencia en Feign
feign.client.config.default.connectTimeout=3000
feign.client.config.default.readTimeout=5000