databaseChangeLog:
  - changeSet:
      id: 1
      author: RomanMateos
      changes:
        - createTable:
            tableName: empleados
            columns:
              - column:
                  name: empleado_id
                  type: INT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: nombre
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: cargo
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: salario
                  type: DOUBLE
                  constraints:
                    nullable: false
              - column:
                  name: activo
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: fecha_ingreso
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: sucursal_id
                  type: INT
                  constraints:
                    nullable: false