server:
  port: 8085

spring:
  application:
    name: pagos

  datasource:
    url: jdbc:mysql://localhost:3306/prueba4?useSSL=false&serverTimezone=America/Santiago&allowPublicKeyRetrieval=true
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        generate_statistics: true
    show-sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

  cloud:
    compatibility-verifier:
      enabled: false

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html